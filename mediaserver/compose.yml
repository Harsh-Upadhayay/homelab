name: mediaserver

services:
  gluetun:
    image: ${GLUETUN_IMAGE}:${GLUETUN_TAG}
    container_name: gluetun
    restart: unless-stopped
    env_file:
      - ../ops/.env.local
      - ./app.env
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    networks:
      - traefik
      - default
    volumes:
      # /gluetun preserves VPN selection and runtime state across rebuilds.
      - ${MEDIASERVER_STATE_ROOT}/gluetun:/gluetun
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qbit.rule=Host(`${QBIT_HOST}`)"
      - "traefik.http.routers.qbit.entrypoints=websecure"
      - "traefik.http.routers.qbit.tls.certresolver=cloudflare"
      - "traefik.http.routers.qbit.middlewares=secure-headers@docker"
      - "traefik.http.services.qbit.loadbalancer.server.port=${QBIT_WEBUI_PORT}"

  qbittorrent:
    image: ${QBIT_IMAGE}:${QBIT_TAG}
    container_name: qbittorrent
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    env_file:
      - ../ops/.env.local
      - ./app.env
    environment:
      - WEBUI_PORT=${QBIT_WEBUI_PORT}
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      # /config is qBittorrent state; /data is the shared media and downloads tree.
      - ${MEDIASERVER_STATE_ROOT}/qbittorrent/config:/config
      - ${MEDIASERVER_DATA_ROOT}:/data

  flaresolverr:
    image: ${FLARESOLVERR_IMAGE}:${FLARESOLVERR_TAG}
    container_name: flaresolverr
    restart: unless-stopped
    env_file:
      - ./app.env
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    networks:
      - default

  prowlarr:
    image: ${PROWLARR_IMAGE}:${PROWLARR_TAG}
    container_name: prowlarr
    restart: unless-stopped
    depends_on:
      - flaresolverr
    env_file:
      - ../ops/.env.local
      - ./app.env
    environment:
      - PROWLARR__AUTH__METHOD=External
      - PROWLARR__AUTH__REQUIRED=true
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    networks:
      - traefik
      - default
    volumes:
      # /config is Prowlarr state.
      - ${MEDIASERVER_STATE_ROOT}/prowlarr/config:/config
      - ${MEDIASERVER_DATA_ROOT}:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prowlarr.rule=Host(`${PROWLARR_HOST}`)"
      - "traefik.http.routers.prowlarr.entrypoints=websecure"
      - "traefik.http.routers.prowlarr.tls.certresolver=cloudflare"
      - "traefik.http.routers.prowlarr.middlewares=authelia-forwardauth@docker,secure-headers@docker"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"

  sonarr:
    image: ${SONARR_IMAGE}:${SONARR_TAG}
    container_name: sonarr
    restart: unless-stopped
    env_file:
      - ../ops/.env.local
      - ./app.env
    environment:
      - SONARR__AUTH__METHOD=External
      - SONARR__AUTH__REQUIRED=true
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    networks: [traefik, default]
    volumes:
      # /config is Sonarr state.
      - ${MEDIASERVER_STATE_ROOT}/sonarr/config:/config
      - ${MEDIASERVER_DATA_ROOT}:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`${SONARR_HOST}`)"
      - "traefik.http.routers.sonarr.entrypoints=websecure"
      - "traefik.http.routers.sonarr.tls.certresolver=cloudflare"
      - "traefik.http.routers.sonarr.middlewares=authelia-forwardauth@docker,secure-headers@docker"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"

  radarr:
    image: ${RADARR_IMAGE}:${RADARR_TAG}
    container_name: radarr
    restart: unless-stopped
    env_file:
      - ../ops/.env.local
      - ./app.env
    environment:
      - RADARR__AUTH__METHOD=External
      - RADARR__AUTH__REQUIRED=true
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    networks: [traefik, default]
    volumes:
      # /config is Radarr state.
      - ${MEDIASERVER_STATE_ROOT}/radarr/config:/config
      - ${MEDIASERVER_DATA_ROOT}:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`${RADARR_HOST}`)"
      - "traefik.http.routers.radarr.entrypoints=websecure"
      - "traefik.http.routers.radarr.tls.certresolver=cloudflare"
      - "traefik.http.routers.radarr.middlewares=authelia-forwardauth@docker,secure-headers@docker"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"

  jellyseerr:
    image: ${JELLYSEERR_IMAGE}:${JELLYSEERR_TAG}
    container_name: jellyseerr
    # Run Jellyseerr as an unprivileged app user; /app/config is already on /storage.
    user: "1000:1000"
    restart: unless-stopped
    env_file:
      - ./app.env
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    networks: [traefik, default]
    volumes:
      # /app/config is the Jellyseerr state directory.
      - ${MEDIASERVER_STATE_ROOT}/jellyseerr/config:/app/config
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyseerr.rule=Host(`${JELLYSEERR_HOST}`)"
      - "traefik.http.routers.jellyseerr.entrypoints=websecure"
      - "traefik.http.routers.jellyseerr.tls.certresolver=cloudflare"
      - "traefik.http.routers.jellyseerr.middlewares=secure-headers@docker"
      - "traefik.http.services.jellyseerr.loadbalancer.server.port=5055"

  jellyfin:
    image: ${JELLYFIN_IMAGE}:${JELLYFIN_TAG}
    container_name: jellyfin
    restart: unless-stopped
    env_file:
      - ./app.env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks: [traefik, default]
    devices: []
    volumes:
      # /config is Jellyfin server state; /cache stays disposable on root.
      - ${MEDIASERVER_STATE_ROOT}/jellyfin/config:/config
      - jellyfin_cache:/cache
      - ${MEDIASERVER_DATA_ROOT}:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`${JELLYFIN_HOST}`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls.certresolver=cloudflare"
      - "traefik.http.routers.jellyfin.middlewares=secure-headers@docker"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"

volumes:
  jellyfin_cache:

networks:
  traefik:
    external: true
  default:
    name: mediaserver_internal
