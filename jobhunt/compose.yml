services:
  mysql:
    image: mysql:8.0
    container_name: jobhunt-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${JOBHUNT_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${JOBHUNT_MYSQL_DATABASE}
      MYSQL_USER: ${JOBHUNT_MYSQL_USER}
      MYSQL_PASSWORD: ${JOBHUNT_MYSQL_PASSWORD}
    volumes:
      - ${JOBHUNT_MYSQL_DATA_LOCATION}:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jobhunt-redis
    restart: unless-stopped
    volumes:
      - ${JOBHUNT_REDIS_DATA_LOCATION}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    image: ${JOBHUNT_IMAGE}:${JOBHUNT_TAG}
    container_name: jobhunt-django
    restart: unless-stopped
    environment:
      APP_MODE: web
      MYSQL_HOST: mysql
      MYSQL_DATABASE: ${JOBHUNT_MYSQL_DATABASE}
      MYSQL_USER: ${JOBHUNT_MYSQL_USER}
      MYSQL_PASSWORD: ${JOBHUNT_MYSQL_PASSWORD}
      DJANGO_SECRET_KEY: ${JOBHUNT_DJANGO_SECRET_KEY}
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: ${JOBHUNT_HOST},django,localhost,127.0.0.1
      DJANGO_CSRF_TRUSTED_ORIGINS: https://${JOBHUNT_HOST}
      APIFY_API_TOKEN: ${JOBHUNT_APIFY_API_TOKEN}
      OPENAI_API_KEY: ${JOBHUNT_OPENAI_API_KEY}
      DISCORD_WEBHOOK_URL_DEFAULT: ${DISCORD_WEBHOOK_URL_DEFAULT}
      DISCORD_WEBHOOK_URL_JAPAN: ${DISCORD_WEBHOOK_URL_JAPAN}
      DISCORD_WEBHOOK_URL_REMOTE: ${DISCORD_WEBHOOK_URL_REMOTE}
      DISCORD_WEBHOOK_URL_INDIA: ${DISCORD_WEBHOOK_URL_INDIA}
      DISCORD_TOP_N_JOBS: ${JOBHUNT_DISCORD_TOP_N_JOBS}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    networks:
      - default
      - traefik
    security_opt:
      - no-new-privileges:true
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - traefik.enable=true
      - traefik.docker.network=traefik
      - traefik.http.routers.jobhunt.rule=Host(`${JOBHUNT_HOST}`) && (PathPrefix(`/api`) || PathPrefix(`/admin`))
      - traefik.http.routers.jobhunt.priority=100
      - traefik.http.routers.jobhunt.entrypoints=websecure
      - traefik.http.routers.jobhunt.tls.certresolver=cloudflare
      - traefik.http.routers.jobhunt.middlewares=authelia-fa-jobhunt,secure-headers@docker,errpages@docker
      - traefik.http.services.jobhunt.loadbalancer.server.port=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/jobs/stats/')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      mysql:
        condition: service_healthy

  celery-worker:
    image: ${JOBHUNT_IMAGE}:${JOBHUNT_TAG}
    restart: unless-stopped
    environment:
      APP_MODE: celery-worker
      MYSQL_HOST: mysql
      MYSQL_DATABASE: ${JOBHUNT_MYSQL_DATABASE}
      MYSQL_USER: ${JOBHUNT_MYSQL_USER}
      MYSQL_PASSWORD: ${JOBHUNT_MYSQL_PASSWORD}
      DJANGO_SECRET_KEY: ${JOBHUNT_DJANGO_SECRET_KEY}
      DJANGO_API_URL: http://django:8000
      DJANGO_CSRF_TRUSTED_ORIGINS: https://${JOBHUNT_HOST}
      APIFY_API_TOKEN: ${JOBHUNT_APIFY_API_TOKEN}
      OPENAI_API_KEY: ${JOBHUNT_OPENAI_API_KEY}
      DISCORD_WEBHOOK_URL_DEFAULT: ${DISCORD_WEBHOOK_URL_DEFAULT}
      DISCORD_WEBHOOK_URL_JAPAN: ${DISCORD_WEBHOOK_URL_JAPAN}
      DISCORD_WEBHOOK_URL_REMOTE: ${DISCORD_WEBHOOK_URL_REMOTE}
      DISCORD_WEBHOOK_URL_INDIA: ${DISCORD_WEBHOOK_URL_INDIA}
      DISCORD_TOP_N_JOBS: ${JOBHUNT_DISCORD_TOP_N_JOBS}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: >
      celery -A celery_app worker
      --loglevel=info
      --pool=threads
      --concurrency=20
    security_opt:
      - no-new-privileges:true
    labels:
      - com.centurylinklabs.watchtower.enable=true
    depends_on:
      redis:
        condition: service_healthy
      django:
        condition: service_healthy

  celery-beat:
    image: ${JOBHUNT_IMAGE}:${JOBHUNT_TAG}
    container_name: jobhunt-celery-beat
    restart: unless-stopped
    environment:
      APP_MODE: celery-beat
      MYSQL_HOST: mysql
      MYSQL_DATABASE: ${JOBHUNT_MYSQL_DATABASE}
      MYSQL_USER: ${JOBHUNT_MYSQL_USER}
      MYSQL_PASSWORD: ${JOBHUNT_MYSQL_PASSWORD}
      DJANGO_SECRET_KEY: ${JOBHUNT_DJANGO_SECRET_KEY}
      DJANGO_API_URL: http://django:8000
      DJANGO_CSRF_TRUSTED_ORIGINS: https://${JOBHUNT_HOST}
      APIFY_API_TOKEN: ${JOBHUNT_APIFY_API_TOKEN}
      OPENAI_API_KEY: ${JOBHUNT_OPENAI_API_KEY}
      DISCORD_WEBHOOK_URL_DEFAULT: ${DISCORD_WEBHOOK_URL_DEFAULT}
      DISCORD_WEBHOOK_URL_JAPAN: ${DISCORD_WEBHOOK_URL_JAPAN}
      DISCORD_WEBHOOK_URL_REMOTE: ${DISCORD_WEBHOOK_URL_REMOTE}
      DISCORD_WEBHOOK_URL_INDIA: ${DISCORD_WEBHOOK_URL_INDIA}
      DISCORD_TOP_N_JOBS: ${JOBHUNT_DISCORD_TOP_N_JOBS}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    security_opt:
      - no-new-privileges:true
    labels:
      - com.centurylinklabs.watchtower.enable=true
    depends_on:
      redis:
        condition: service_healthy
      django:
        condition: service_healthy

  frontend:
    image: ${JOBHUNT_FRONTEND_IMAGE}:${JOBHUNT_FRONTEND_TAG:-main}
    container_name: jobhunt-frontend
    restart: unless-stopped
    environment:
      HOSTNAME: 0.0.0.0
      BACKEND_INTERNAL_URL: http://django:8000
      INTERNAL_API_TOKEN: ${JOBHUNT_INTERNAL_API_TOKEN}
    networks:
      - default
      - traefik
    security_opt:
      - no-new-privileges:true
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - traefik.enable=true
      - traefik.docker.network=traefik
      - traefik.http.routers.jobhunt-frontend.rule=Host(`${JOBHUNT_HOST}`)
      - traefik.http.routers.jobhunt-frontend.entrypoints=websecure
      - traefik.http.routers.jobhunt-frontend.tls.certresolver=cloudflare
      - traefik.http.routers.jobhunt-frontend.middlewares=authelia-fa-jobhunt,secure-headers@docker,errpages@docker
      - traefik.http.services.jobhunt-frontend.loadbalancer.server.port=3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/bff/jobs/stats/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      django:
        condition: service_healthy

networks:
  traefik:
    external: true
  default:
    name: jobhunt_internal
