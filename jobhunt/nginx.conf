worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile           on;
    tcp_nopush         on;
    types_hash_max_size 2048;
    client_max_body_size 25m;

    # Map for WebSocket upgrade (Next.js + any future websockets)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Headers forwarded to every upstream. Host/proto are preserved so Django's
    # ALLOWED_HOSTS + CSRF_TRUSTED_ORIGINS keep matching the public hostname.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_http_version 1.1;

    server {
        listen 80;
        server_name _;

        # Docker's embedded DNS. Resolving upstreams at request time (via the
        # variables below) means a django/frontend container restart with a new
        # IP doesn't require an nginx restart, and nginx still starts if an
        # upstream is briefly down.
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $django   http://django:8000;
        set $frontend http://frontend:3000;

        # ── Django: REST API, admin UI, and admin static assets ──────────────
        location /api/    { proxy_pass $django; }
        location /admin/  { proxy_pass $django; }
        location /static/ { proxy_pass $django; }

        # ── Next.js frontend: /, /login, /insights, /bff/*, /_next/*, … ──────
        location / {
            proxy_pass $frontend;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
