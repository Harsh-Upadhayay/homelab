services:
  openvscode-server:
    image: ${OPENVSCODE_SERVER_IMAGE}:${OPENVSCODE_SERVER_TAG}
    container_name: openvscode-server
    restart: unless-stopped
    env_file:
      - ../ops/.env.local
      - ./app.env
    environment:
      PUID: ${OPENVSCODE_SERVER_PUID}
      PGID: ${OPENVSCODE_SERVER_PGID}
      TZ: ${TZ:-UTC}
      UMASK: ${OPENVSCODE_SERVER_UMASK}
    volumes:
      # OpenVSCode Server keeps user config, extensions, and workspace state in /config.
      - ${OPENVSCODE_SERVER_CONFIG_DIR}:/config
    networks:
      - traefik
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${OPENVSCODE_SERVER_PORT}/version >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - traefik.http.routers.openvscode-server.rule=Host(`${OPENVSCODE_SERVER_HOST}`)
      - traefik.http.routers.openvscode-server.entrypoints=websecure
      - traefik.http.routers.openvscode-server.tls.certresolver=cloudflare
      - traefik.http.routers.openvscode-server.middlewares=authelia-fa-openvscode-server,secure-headers@docker,errpages@docker
      - traefik.http.services.openvscode-server.loadbalancer.server.port=${OPENVSCODE_SERVER_PORT}

networks:
  traefik:
    external: true
