server {
  listen 9223;
  server_name _;

  location /json/ {
    proxy_pass http://openclaw-browser:9222;
    proxy_set_header Host 127.0.0.1:9222;
    proxy_http_version 1.1;

    sub_filter_types application/json;
    sub_filter_once off;
    sub_filter 'ws://127.0.0.1:9222/' 'ws://openclaw-browser-proxy:9223/';
    sub_filter 'ws://localhost/' 'ws://openclaw-browser-proxy:9223/';
  }

  location /devtools/ {
    proxy_pass http://openclaw-browser:9222;
    proxy_set_header Host 127.0.0.1:9222;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
  }
}
