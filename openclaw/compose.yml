x-openclaw-env: &openclaw-env
  HOME: /home/node
  TERM: xterm-256color
  TZ: ${TZ:-UTC}
  OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
  CAREERFLOW_API_URL: ${CAREERFLOW_API_URL}
  BOOTSTRAP_OPENCLAW_HOME: /home/node/.openclaw
  BOOTSTRAP_OPENCLAW_WORKSPACE: /home/node/.openclaw/workspace
  BOOTSTRAP_OPENCLAW_SKILLS_SRC_DIR: /opt/openclaw-careerflow-skills
  BOOTSTRAP_OPENCLAW_BATCH_BASE_FILE: /opt/openclaw/config/batch/base.json

services:
  openclaw-init:
    image: ${OPENCLAW_IMAGE}:${OPENCLAW_TAG}
    container_name: openclaw-init
    user: "0:0"
    restart: "no"
    init: true
    env_file:
      - ../ops/.env.local
      - ./app.env
    environment:
      <<: *openclaw-env
    entrypoint:
      - /bin/sh
      - /opt/openclaw/scripts/init-workspace.sh
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - ./skills-src:/opt/openclaw-careerflow-skills:ro
      - ./scripts:/opt/openclaw/scripts:ro

  openclaw-skill-sync:
    image: alpine:3.20
    container_name: openclaw-skill-sync
    user: "0:0"
    restart: unless-stopped
    init: true
    depends_on:
      openclaw-init:
        condition: service_completed_successfully
    env_file:
      - ../ops/.env.local
      - ./app.env
    environment:
      BOOTSTRAP_OPENCLAW_WORKSPACE: /workspace
      BOOTSTRAP_OPENCLAW_SKILLS_SRC_DIR: /skills-src
    command:
      - /bin/sh
      - /opt/openclaw/scripts/sync-skills.sh
    volumes:
      - ${OPENCLAW_WORKSPACE_DIR}:/workspace
      - ./skills-src:/skills-src:ro
      - ./scripts:/opt/openclaw/scripts:ro

  openclaw-browser:
    image: zenika/alpine-chrome:latest
    container_name: openclaw-browser
    restart: unless-stopped
    init: true
    command:
      - --no-sandbox
      - --disable-dev-shm-usage
      - --remote-allow-origins=*
      - --remote-debugging-port=${OPENCLAW_BROWSER_DEBUG_PORT}
      - --remote-debugging-address=0.0.0.0
      - about:blank
    ports:
      - "127.0.0.1:${OPENCLAW_BROWSER_HOST_DEBUG_PORT}:${OPENCLAW_BROWSER_DEBUG_PORT}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:${OPENCLAW_BROWSER_DEBUG_PORT}/json/version >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks:
      - traefik

  openclaw-browser-proxy:
    image: nginx:1.27-alpine
    container_name: openclaw-browser-proxy
    restart: unless-stopped
    init: true
    depends_on:
      openclaw-browser:
        condition: service_healthy
    volumes:
      - ./config/nginx/browser-cdp-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:9223/json/version >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    networks:
      - traefik

  openclaw-gateway:
    image: ${OPENCLAW_IMAGE}:${OPENCLAW_TAG}
    container_name: openclaw-gateway
    restart: unless-stopped
    user: "0:0"
    init: true
    depends_on:
      openclaw-init:
        condition: service_completed_successfully
      openclaw-browser:
        condition: service_healthy
      openclaw-browser-proxy:
        condition: service_healthy
    env_file:
      - ../ops/.env.local
      - ./app.env
    environment:
      <<: *openclaw-env
      OPENCLAW_CONTROL_UI_DISABLE_DEVICE_AUTH: ${OPENCLAW_CONTROL_UI_DISABLE_DEVICE_AUTH:-false}
    command:
      - /bin/sh
      - /opt/openclaw/scripts/start-gateway.sh
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - ${HOMELAB_STORAGE_ROOT}/careerflow/data/artifacts:/home/node/.openclaw/workspace/careerflow-artifacts:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config:/opt/openclaw/config:ro
      - ./scripts:/opt/openclaw/scripts:ro
    ports:
      - "127.0.0.1:${OPENCLAW_GATEWAY_PORT}:18789"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - traefik
    security_opt:
      - no-new-privileges:true
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - traefik.http.routers.openclaw.rule=Host(`${OPENCLAW_HOST}`)
      - traefik.http.routers.openclaw.entrypoints=websecure
      - traefik.http.routers.openclaw.tls.certresolver=cloudflare
      - traefik.http.routers.openclaw.middlewares=authelia-fa-openclaw,secure-headers@docker,errpages@docker
      - traefik.http.services.openclaw.loadbalancer.server.port=18789

  openclaw-cli:
    image: ${OPENCLAW_IMAGE}:${OPENCLAW_TAG}
    profiles:
      - cli
    network_mode: "service:openclaw-gateway"
    depends_on:
      - openclaw-gateway
    init: true
    stdin_open: true
    tty: true
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    env_file:
      - ../ops/.env.local
      - ./app.env
    environment:
      <<: *openclaw-env
      BROWSER: echo
    entrypoint:
      - node
      - dist/index.js
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - ${HOMELAB_STORAGE_ROOT}/careerflow/data/artifacts:/home/node/.openclaw/workspace/careerflow-artifacts:ro
    security_opt:
      - no-new-privileges:true

networks:
  traefik:
    external: true
