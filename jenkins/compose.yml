services:
  jenkins:
    build:
      context: .
    container_name: jenkins
    restart: unless-stopped
    env_file:
      - ../ops/.env.local
      - ./app.env
    environment:
      DOCKER_HOST: tcp://docker:2376
      DOCKER_CERT_PATH: /certs/client
      DOCKER_TLS_VERIFY: "1"
      TZ: Asia/Tokyo
    volumes:
      # Jenkins controller state lives under /var/jenkins_home.
      - ${JENKINS_HOME_LOCATION}:/var/jenkins_home
      - jenkins_docker_certs:/certs/client:ro
    depends_on:
      - dind
    networks:
      - traefik
      - jenkins_net
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - traefik.http.services.jenkins.loadbalancer.server.port=8080
      - traefik.http.routers.jenkins.rule=Host(`${JENKINS_HOST}`)
      - traefik.http.routers.jenkins.entrypoints=websecure
      - traefik.http.routers.jenkins.tls.certresolver=cloudflare
      - traefik.http.routers.jenkins.middlewares=authelia-fa-jenkins@docker,secure-headers@docker
      - traefik.http.routers.jenkins-webhook.rule=Host(`${JENKINS_HOST}`) && PathPrefix(`/github-webhook`)
      - traefik.http.routers.jenkins-webhook.entrypoints=websecure
      - traefik.http.routers.jenkins-webhook.tls.certresolver=cloudflare
      - traefik.http.routers.jenkins-webhook.priority=100
      - traefik.http.routers.jenkins-webhook.service=jenkins
      - traefik.http.routers.jenkins-webhook.middlewares=secure-headers@docker

  dind:
    image: ${JENKINS_DIND_IMAGE}:${JENKINS_DIND_TAG}
    container_name: dind
    privileged: true
    restart: unless-stopped
    env_file:
      - ../ops/.env.local
      - ./app.env
    environment:
      DOCKER_TLS_CERTDIR: /certs
    command: ["--storage-driver", "overlay2"]
    volumes:
      - jenkins_docker_certs:/certs/client
      - ${JENKINS_HOME_LOCATION}:/var/jenkins_home
    networks:
      jenkins_net:
        aliases:
          - docker

networks:
  traefik:
    external: true
  jenkins_net:

volumes:
  jenkins_docker_certs:
