services:
  ollama:
    image: ${OLLAMA_IMAGE}:${OLLAMA_TAG}
    container_name: ollama
    restart: unless-stopped
    env_file:
      - ../ops/.env.local
    volumes:
      # Do not edit the next line. If you want to change the model storage
      # location on your system, edit OLLAMA_DATA_LOCATION in app.env.
      - ${OLLAMA_DATA_LOCATION}:/root/.ollama
    networks:
      - traefik
    runtime: nvidia
    gpus: all
    security_opt:
      - no-new-privileges:true
    environment:
      # Override ops-env has ollamahost  previously set OLLAMA_HOST to a domain/IP
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_LLM_LIBRARY=cuda_v12
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=1

    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - traefik.http.routers.ollama.rule=Host(`${OLLAMA_HOST}`)
      - traefik.http.routers.ollama.entrypoints=websecure
      - traefik.http.routers.ollama.tls.certresolver=cloudflare
      - traefik.http.services.ollama.loadbalancer.server.port=11434
      - traefik.http.routers.ollama.middlewares=authelia-fa-ollama,secure-headers@docker,errpages@docker

  ollama-openai-gateway:
    image: nginx:alpine
    container_name: ollama-openai-gateway
    restart: unless-stopped
    env_file:
      - ../ops/.env.local
    volumes:
      - ./nginx/openai-gateway.conf.template:/etc/nginx/templates/default.conf.template:ro
    networks:
      - traefik
    security_opt:
      - no-new-privileges:true
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - traefik.http.routers.ollama-openai.rule=Host(`${OLLAMA_HOST}`) && PathPrefix(`/v1`)
      - traefik.http.routers.ollama-openai.priority=100
      - traefik.http.routers.ollama-openai.entrypoints=websecure
      - traefik.http.routers.ollama-openai.tls.certresolver=cloudflare
      - traefik.http.routers.ollama-openai.middlewares=secure-headers@docker
      - traefik.http.routers.ollama-openai.service=ollama-openai
      - traefik.http.services.ollama-openai.loadbalancer.server.port=80

networks:
  traefik:
    external: true
